name: Dev Terraform CD Pipeline

# Deploy Contact Lens infrastructure to dev
on:
  push:
    branches:
      - dev
    paths:
      - "infra/env/dev/**"
      - "infra/modules/**"
      - ".github/workflows/**"
      - "scripts/**"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: true
  TF_WORKING_DIR: infra/env/dev

  # Terraform variables downloaded from S3
  TFVARS_FILE: contact-lens-pipeline.tfvars
  TFVARS_S3_KEY: terraform/dev/af-south-1/contact-lens-pipeline.tfvars

  # Terraform plan passed between the plan and apply jobs
  PLAN_FILE: tfplan
  PLAN_S3_KEY: artifacts/dev/contact-lens-pipeline/${{ github.run_id }}/tfplan


jobs:
  # ----------------------------------------------------------
  # Validate Terraform configuration
  # ----------------------------------------------------------
  validate:
    name: Validate Terraform

    runs-on: codebuild-npsenvoicedev-dev-afs1-contact-lens-pipeline-${{ github.run_id }}-${{ github.run_attempt }}

    environment: dev
    timeout-minutes: 30

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch Netskope certificate
        run: |
          aws s3 cp \
            s3://${{ vars.CERTIFICATE_S3_BUCKET_NAME }}/bundle.pem \
            ./bundle.pem

      - name: Configure SSL certificate
        run: |
          sudo cp ./bundle.pem /etc/pki/ca-trust/source/anchors/bundle.pem
          sudo update-ca-trust

          echo "NODE_EXTRA_CA_CERTS=$(pwd)/bundle.pem" >> "$GITHUB_ENV"
          echo "AWS_CA_BUNDLE=$(pwd)/bundle.pem" >> "$GITHUB_ENV"

      - name: Install Terraform
        run: |
          sudo yum install -y yum-utils

          sudo yum-config-manager \
            --add-repo \
            https://rpm.releases.hashicorp.com/AmazonLinux/hashicorp.repo

          sudo yum install -y terraform

          terraform --version

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate


  # ----------------------------------------------------------
  # Create and store Terraform plan
  # ----------------------------------------------------------
  plan:
    name: Terraform Plan

    needs:
      - validate

    runs-on: codebuild-npsenvoicedev-dev-afs1-contact-lens-pipeline-${{ github.run_id }}-${{ github.run_attempt }}

    environment: dev
    timeout-minutes: 30

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch Netskope certificate
        run: |
          aws s3 cp \
            s3://${{ vars.CERTIFICATE_S3_BUCKET_NAME }}/bundle.pem \
            ./bundle.pem

      - name: Configure SSL certificate
        run: |
          sudo cp ./bundle.pem /etc/pki/ca-trust/source/anchors/bundle.pem
          sudo update-ca-trust

          echo "NODE_EXTRA_CA_CERTS=$(pwd)/bundle.pem" >> "$GITHUB_ENV"
          echo "AWS_CA_BUNDLE=$(pwd)/bundle.pem" >> "$GITHUB_ENV"

      - name: Install Terraform
        run: |
          sudo yum install -y yum-utils

          sudo yum-config-manager \
            --add-repo \
            https://rpm.releases.hashicorp.com/AmazonLinux/hashicorp.repo

          sudo yum install -y terraform

          terraform --version

      - name: Fetch Terraform variables
        run: |
          aws s3 cp \
            s3://${{ vars.TF_VARIABLES_BUCKET_NAME }}/${{ env.TFVARS_S3_KEY }} \
            ./${{ env.TFVARS_FILE }}

          test -s "./${{ env.TFVARS_FILE }}"

          echo "Terraform variables file downloaded successfully."

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: |
          terraform plan \
            -input=false \
            -var-file="${{ env.TFVARS_FILE }}" \
            -out="${{ env.PLAN_FILE }}"

      - name: Upload Terraform plan to S3
        run: |
          aws s3 cp \
            "${{ env.PLAN_FILE }}" \
            "s3://${{ vars.ARTIFACTS_BUCKET_NAME }}/${{ env.PLAN_S3_KEY }}"

          echo "Terraform plan uploaded successfully."


  # ----------------------------------------------------------
  # Apply the exact Terraform plan generated above
  # ----------------------------------------------------------
  apply:
    name: Terraform Apply

    needs:
      - plan

    runs-on: codebuild-npsenvoicedev-dev-afs1-contact-lens-pipeline-${{ github.run_id }}-${{ github.run_attempt }}

    environment: dev
    timeout-minutes: 30

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch Netskope certificate
        run: |
          aws s3 cp \
            s3://${{ vars.CERTIFICATE_S3_BUCKET_NAME }}/bundle.pem \
            ./bundle.pem

      - name: Configure SSL certificate
        run: |
          sudo cp ./bundle.pem /etc/pki/ca-trust/source/anchors/bundle.pem
          sudo update-ca-trust

          echo "NODE_EXTRA_CA_CERTS=$(pwd)/bundle.pem" >> "$GITHUB_ENV"
          echo "AWS_CA_BUNDLE=$(pwd)/bundle.pem" >> "$GITHUB_ENV"

      - name: Install Terraform
        run: |
          sudo yum install -y yum-utils

          sudo yum-config-manager \
            --add-repo \
            https://rpm.releases.hashicorp.com/AmazonLinux/hashicorp.repo

          sudo yum install -y terraform

          terraform --version

      - name: Terraform Init
        run: terraform init -input=false

      - name: Download Terraform plan
        run: |
          aws s3 cp \
            "s3://${{ vars.ARTIFACTS_BUCKET_NAME }}/${{ env.PLAN_S3_KEY }}" \
            "${{ env.PLAN_FILE }}"

          test -s "${{ env.PLAN_FILE }}"

          echo "Terraform plan downloaded successfully."

      - name: Terraform Apply
        run: |
          terraform apply \
            -input=false \
            -auto-approve \
            "${{ env.PLAN_FILE }}"
